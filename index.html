<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">

        <nav></nav>

        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://plus.unsplash.com/premium_photo-1675277752799-74af480da1c6?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDExfHx8ZW58MHx8fHx8" alt="">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://plus.unsplash.com/premium_photo-1681400751087-2340425a65ae?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDh8fHxlbnwwfHx8fHw%3D" alt="">
                <h2>Daily Planner</h2>
            </div>
            <div class="moti elem" id="2">
                <img src="https://plus.unsplash.com/premium_photo-1663954645355-2481bdb0a65b?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDE4fHx8ZW58MHx8fHx8" alt="">
                <h2>Motivation</h2>
            </div>
            <div class="pomo elem" id="3">
                <img src="https://plus.unsplash.com/premium_photo-1686844461936-c65639db3ed9?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDh8fHxlbnwwfHx8fHw%3D" alt="">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="goal elem" id="4">
                <img src="https://plus.unsplash.com/premium_photo-1666532319234-907c5059c999?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDE2fHx8ZW58MHx8fHx8" alt="">
                <h2>Daily Goals</h2>
            </div>
        </section>

        <section class="fullElem  todo-list-fullpage">
            <button class="back" id="0"><i class="ri-close-fill"></i></button>
            <h2>Your Personalised Task List</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input class="input-task" type="text" placeholder="Enter Task">
                        <textarea placeholder="Enter details" name="" id=""></textarea>
                        <div class="mark-imp">
                            <input class="checkbox" type="checkbox" id="check">
                            <label class="label" for="check">Mark as Important!</label>
                        </div>
                        <button>Add Task</button>
                    </form>
                </div>
                <div class="allTask">

                </div>
            </div>
        </section>

        <section class="fullElem daily-planner-fullpage">
            <button class="back" id="1"><i class="ri-close-fill"></i></button>
            <h2>Plan your day to be more productive</h2>
            <div class="day-planner">
            </div>
        </section>
        <section class="fullElem motivation-fullpage">
            <button class="back" id="2"><i class="ri-close-fill"></i></button>
            <h2>Motivational Quotes</h2>
            <div class="motivational-container">

            </div>
        </section>
        <section class="fullElem pomodomo-timer-fullpage">
            <button class="back" id="3"><i class="ri-close-fill"></i></button>
            <h2>Pomodomo Timer</h2>
            <div class="pomodomo-container">

            </div>
        </section>
        <section class="fullElem daily-goals-fullpage">
            <button class="back" id="4"><i class="ri-close-fill"></i></button>
            <h2>Daily Goals</h2>
            <div class="goals-container">

            </div>
        </section>


    </div>
    <script src="script.js"></script>
</body>
</html>
